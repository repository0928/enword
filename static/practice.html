<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字練習</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 text-emerald-900 font-sans min-h-screen p-6 flex flex-col items-center justify-center">
    
    <div class="max-w-lg w-full bg-white rounded-xl shadow-lg p-8">
        <a href="/static/index.html" class="text-emerald-600 underline mb-4 inline-block">← 放棄練習，返回首頁</a>
        
        <div id="quiz-container" class="text-center hidden">
            <p class="text-sm text-gray-500 mb-2">進度: <span id="progress"></span></p>
            <h2 class="text-4xl font-bold text-gray-800 mb-2" id="q-chinese">中文</h2>
            <p class="text-lg text-emerald-600 font-semibold mb-6" id="q-pos">詞性</p>
            
            <p class="text-3xl tracking-widest font-mono text-gray-400 mb-6" id="q-mask">_ _ _ _</p>
            
            <input type="text" id="answer-input" placeholder="輸入英文..." class="w-full text-center text-2xl p-3 border-2 border-emerald-300 rounded focus:outline-none focus:border-emerald-500 mb-4" autocomplete="off">
            <button onclick="checkAnswer()" id="submit-btn" class="w-full bg-emerald-600 text-white font-bold py-3 rounded hover:bg-emerald-700 text-lg">送出答案 (Enter)</button>

            <div id="feedback-box" class="mt-6 p-4 rounded hidden text-left">
                <p id="feedback-title" class="font-bold text-xl mb-2"></p>
                <div id="feedback-example" class="space-y-3"></div>
                <button onclick="nextQuestion()" class="mt-4 w-full bg-gray-800 text-white py-2 rounded">下一題</button>
            </div>
        </div>

        <div id="finish-container" class="text-center hidden">
            <h2 class="text-3xl font-bold text-emerald-600 mb-4">🎉 練習完成！</h2>
            <p class="text-2xl mb-2">你的得分：<span id="score-display" class="font-bold text-orange-500"></span></p>
            <p class="text-gray-600 mb-6">錯題已經自動收錄到你的錯題本囉！</p>
            <a href="/static/index.html" class="bg-emerald-600 text-white px-6 py-3 rounded font-bold hover:bg-emerald-700">回到首頁</a>
        </div>
    </div>

    <script>
const urlParams = new URLSearchParams(window.location.search);
const setId = urlParams.get('set_id');
const mode = urlParams.get('mode');
const countReq = urlParams.get('count'); 
const userId = localStorage.getItem('user_id');

let words = [], currentIndex = 0, correctCount = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

async function initQuiz() {
    const api = (mode === 'wrong') ? `/wrong_answers/${userId}` : `/quiz/${setId}`;
    const res = await fetch(api);
    let allWords = await res.json();
    
    if (!allWords.length) {
        alert("目前沒有題目！");
        window.location.href = "/static/index.html";
        return;
    }

    allWords = shuffle(allWords);

    if (countReq !== 'all') {
        const n = parseInt(countReq);
        words = allWords.slice(0, n);
    } else {
        words = allWords;
    }

    document.getElementById('quiz-container').classList.remove('hidden');
    showQuestion();
}

function showQuestion() {
    const word = words[currentIndex];
    document.getElementById('progress').innerText = `${currentIndex + 1} / ${words.length}`;
    document.getElementById('q-chinese').innerText = word.chinese;
    document.getElementById('q-pos').innerText = word.part_of_speech;
    document.getElementById('q-mask').innerText = word.english.replace(/[a-zA-Z]/g, '_ ');
    
    document.getElementById('answer-input').value = '';
    document.getElementById('answer-input').disabled = false;
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('feedback-box').classList.add('hidden');
    document.getElementById('answer-input').focus();
}

async function checkAnswer() {
    const input = document.getElementById('answer-input').value.trim().toLowerCase();
    const word = words[currentIndex];
    const isCorrect = (input === word.english.toLowerCase());
    
    document.getElementById('answer-input').disabled = true;
    document.getElementById('submit-btn').disabled = true;

    if (isCorrect) correctCount++;

    let examples = [];
    try { examples = JSON.parse(word.example_sentence || "[]"); } catch(e) {}
    
    const highlight = (text) => text.replace(new RegExp(word.english, 'gi'), `<b>${word.english}</b>`);
    
    let exHtml = examples.map(ex => `
        <div class="border-l-4 border-emerald-200 pl-3 mb-2">
            <p class="text-gray-800">📖 ${highlight(ex.en)}</p>
            <p class="text-emerald-700 text-sm">${ex.zh}</p>
        </div>
    `).join('');

    const box = document.getElementById('feedback-box');
    box.classList.remove('hidden', 'bg-emerald-100', 'bg-red-100');
    box.classList.add(isCorrect ? 'bg-emerald-100' : 'bg-red-100');
    
    document.getElementById('feedback-title').innerHTML = isCorrect ? "✅ 答對了！" : `❌ 答案是：<b class="text-2xl">${word.english}</b>`;
    document.getElementById('feedback-example').innerHTML = exHtml;

    if (!isCorrect) {
        const fd = new FormData();
        fd.append('user_id', userId);
        fd.append('word_id', word.id);
        fd.append('is_correct', false);
        fetch('/submit_answer', { method: 'POST', body: fd });
    }
}

// 👑 這是這次修正的重點：測驗結束時上傳成績
// 👑 加上 async 讓函數可以等待
async function nextQuestion() {
    currentIndex++;
    if (currentIndex >= words.length) {
        document.getElementById('quiz-container').classList.add('hidden');
        document.getElementById('finish-container').classList.remove('hidden');
        
        const finalScore = `${correctCount} / ${words.length}`;
        document.getElementById('score-display').innerText = finalScore;

        const recordFd = new FormData();
        recordFd.append('user_id', userId);
        const recordName = (mode === 'wrong') ? "❌ 錯題本複習" : `📖 隨機測驗 (${words.length}題)`;
        recordFd.append('set_name', recordName);
        recordFd.append('score', finalScore);

        // 👑 加上 await，確保跟伺服器說「我考完了」才放行
        try {
            await fetch('/submit_record', { method: 'POST', body: recordFd });
        } catch (e) {
            console.error("成績上傳失敗");
        }

    } else {
        showQuestion();
    }
}
document.getElementById('answer-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const isBoxHidden = document.getElementById('feedback-box').classList.contains('hidden');
        if (isBoxHidden) checkAnswer(); else nextQuestion();
    }
});

initQuiz();    </script>
</body>
</html>
