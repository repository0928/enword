<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字練習</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 text-emerald-900 font-sans min-h-screen p-6 flex flex-col items-center justify-center">
    
    <div class="max-w-lg w-full bg-white rounded-xl shadow-lg p-8">
        <a href="/static/index.html" class="text-emerald-600 underline mb-4 inline-block">← 放棄練習，返回首頁</a>
        
        <div id="quiz-container" class="text-center hidden">
            <p class="text-sm text-gray-500 mb-2">進度: <span id="progress"></span></p>
            <h2 class="text-4xl font-bold text-gray-800 mb-2" id="q-chinese">中文</h2>
            <p class="text-lg text-emerald-600 font-semibold mb-6" id="q-pos">詞性</p>
            
            <p class="text-3xl tracking-widest font-mono text-gray-400 mb-6" id="q-mask">_ _ _ _</p>
            
            <input type="text" id="answer-input" placeholder="輸入英文..." class="w-full text-center text-2xl p-3 border-2 border-emerald-300 rounded focus:outline-none focus:border-emerald-500 mb-4" autocomplete="off">
            <button onclick="checkAnswer()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded hover:bg-emerald-700 text-lg">送出答案 (Enter)</button>

            <div id="feedback-box" class="mt-6 p-4 rounded hidden text-left">
                <p id="feedback-title" class="font-bold text-xl mb-2"></p>
                <p id="feedback-example" class="text-gray-700 italic"></p>
                <button onclick="nextQuestion()" class="mt-4 w-full bg-gray-800 text-white py-2 rounded">下一題</button>
            </div>
        </div>

        <div id="finish-container" class="text-center hidden">
            <h2 class="text-3xl font-bold text-emerald-600 mb-4">🎉 練習完成！</h2>
            <p class="text-xl mb-6">錯題已經自動收錄到你的錯題本囉！</p>
            <a href="/static/index.html" class="bg-emerald-600 text-white px-6 py-3 rounded font-bold hover:bg-emerald-700">回到首頁</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const setId = urlParams.get('set_id');
        const userId = localStorage.getItem('user_id');
        let words = [];
        let currentIndex = 0;

        // 監聽 Enter 鍵
        document.getElementById('answer-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                if (document.getElementById('feedback-box').classList.contains('hidden')) {
                    checkAnswer();
                } else {
                    nextQuestion();
                }
            }
        });

        async function initQuiz() {
            if (!setId || !userId) {
                alert("缺少參數或未登入");
                window.location.href = "/static/index.html";
                return;
            }
            const res = await fetch(`/quiz/${setId}`);
            words = await res.json();
            
            if (words.length === 0) {
                alert("這個題組沒有單字！");
                window.location.href = "/static/index.html";
                return;
            }
            
            document.getElementById('quiz-container').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const word = words[currentIndex];
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${words.length}`;
            document.getElementById('q-chinese').innerText = word.chinese;
            document.getElementById('q-pos').innerText = word.part_of_speech;
            
            // 產生底線遮罩 (將字母換成底線)
            const mask = word.english.replace(/[a-zA-Z]/g, '_ ');
            document.getElementById('q-mask').innerText = mask.trim();
            
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
            document.getElementById('feedback-box').classList.add('hidden');
        }

        async function checkAnswer() {
            const input = document.getElementById('answer-input').value.trim().toLowerCase();
            const word = words[currentIndex];
            const isCorrect = (input === word.english.toLowerCase());
            
            const feedbackBox = document.getElementById('feedback-box');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackExample = document.getElementById('feedback-example');
            
            feedbackBox.classList.remove('hidden', 'bg-emerald-100', 'bg-red-100', 'text-emerald-800', 'text-red-800');

            if (isCorrect) {
                feedbackBox.classList.add('bg-emerald-100', 'text-emerald-800');
                feedbackTitle.innerText = "✅ 答對了！";
                feedbackExample.innerText = "";
            } else {
                feedbackBox.classList.add('bg-red-100', 'text-red-800');
                feedbackTitle.innerText = `❌ 答錯了！正確答案是：${word.english}`;
                feedbackExample.innerText = `例句：${word.example_sentence}`;
                
                // 記錄錯題到資料庫
                const formData = new FormData();
                formData.append('user_id', userId);
                formData.append('word_id', word.id);
                formData.append('is_correct', false);
                await fetch('/submit_answer', { method: 'POST', body: formData });
            }
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < words.length) {
                showQuestion();
            } else {
                document.getElementById('quiz-container').classList.add('hidden');
                document.getElementById('finish-container').classList.remove('hidden');
            }
        }

        initQuiz();
    </script>
</body>
</html>
