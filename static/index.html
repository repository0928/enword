<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國中英文單字練習系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 text-emerald-900 font-sans min-h-screen p-6 relative">

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-3xl font-bold text-emerald-700 mb-6 text-center">📖 國中英文單字練習</h1>

        <div id="auth-section" class="mb-8 p-6 border-2 border-emerald-100 rounded-lg max-w-sm mx-auto">
            <div class="flex mb-5 border-b-2 border-gray-100">
                <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2 font-bold text-emerald-600 border-b-4 border-emerald-600 transition-all">登入</button>
                <button id="tab-register" onclick="switchTab('register')" class="flex-1 py-2 font-bold text-gray-400 border-b-4 border-transparent hover:text-emerald-500 transition-all">註冊新帳號</button>
            </div>
            <div id="login-form" class="flex flex-col gap-3">
                <select id="login-username" class="p-2 border rounded focus:outline-emerald-500 bg-white">
                    <option value="">-- 載入名單中... --</option>
                </select>
                <input type="password" id="login-password" placeholder="請輸入密碼" class="p-2 border rounded focus:outline-emerald-500">
                <button onclick="login()" class="bg-emerald-600 text-white px-6 py-2 rounded font-bold hover:bg-emerald-700 mt-2">登入</button>
            </div>
            <div id="register-form" class="hidden flex-col gap-3">
                <input type="text" id="reg-username" placeholder="請輸入你的姓名" class="p-2 border rounded focus:outline-emerald-500">
                <input type="password" id="reg-password" placeholder="設定密碼 (至少 4 個數字)" class="p-2 border rounded focus:outline-emerald-500">
                <button onclick="register()" class="bg-blue-500 text-white px-6 py-2 rounded font-bold hover:bg-blue-600 mt-2">註冊並登入</button>
            </div>
        </div>

        <div id="dashboard" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <p class="text-lg">你好，<span id="user-display" class="font-bold text-emerald-700"></span>！</p>
                <button onclick="logout()" class="text-sm text-gray-500 underline hover:text-emerald-700">登出</button>
            </div>

            <div class="mb-8 p-4 bg-gray-50 rounded-lg border border-gray-200">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-bold">➕ 新增題組 (上傳 CSV)</h3>
                    <a href="/download_template" class="text-sm text-blue-600 hover:text-blue-800 underline flex items-center gap-1">
                        📥 下載範例檔.csv
                    </a>
                </div>
                <div class="flex flex-col gap-2">
                    <input type="text" id="set-name" placeholder="題組名稱 (如：L1 單字)" class="p-2 border rounded">
                    <input type="file" id="csv-file" accept=".csv" class="text-sm">
                    <button id="upload-btn" onclick="uploadCSV()" class="bg-emerald-500 text-white py-2 rounded font-bold hover:bg-emerald-600">上傳並開始分析例句</button>

                    <!-- 進度條區塊（上傳時才顯示） -->
                    <div id="upload-progress" class="hidden mt-2">
                        <div class="flex justify-between text-sm text-gray-500 mb-1">
                            <span id="progress-label">準備中...</span>
                            <span id="progress-count"></span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div id="progress-bar" class="bg-emerald-500 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold">📚 我的題組</h3>
                <button onclick="openUploadModal()" class="bg-emerald-600 text-white px-3 py-1.5 rounded font-bold hover:bg-emerald-700 text-sm">＋ 上傳題組</button>
            </div>
            <ul id="sets-list" class="space-y-3"></ul>

            <h3 class="font-bold mt-8 mb-4 border-t pt-4">📊 最近練習紀錄</h3>
            <ul id="records-list" class="text-sm space-y-2 text-gray-600"></ul>
            <div id="records-pagination" style="display:none" class="items-center justify-between mt-4 text-sm">
                <button id="page-prev" onclick="changePage(-1)" class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300 font-bold disabled:opacity-40">← 上一頁</button>
                <span id="page-info" class="text-gray-500"></span>
                <button id="page-next" onclick="changePage(1)" class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300 font-bold disabled:opacity-40">下一頁 →</button>
            </div>
        </div>
    </div>

    <!-- 上傳題組 Modal -->
    <div id="upload-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-xl font-bold text-emerald-800">➕ 新增題組</h3>
                <button onclick="closeUploadModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
            </div>
            <div class="flex flex-col gap-3">
                <div>
                    <label class="text-sm font-bold text-gray-600">題組名稱</label>
                    <input type="text" id="modal-set-name" placeholder="如：L1 單字" class="w-full p-2 border rounded focus:outline-emerald-500 mt-1">
                </div>
                <div>
                    <label class="text-sm font-bold text-gray-600">選擇 CSV 檔案</label>
                    <div class="flex items-center gap-2 mt-1">
                        <input type="file" id="modal-csv-file" accept=".csv" class="text-sm flex-1">
                        <a href="/download_template" class="text-xs text-blue-600 hover:underline shrink-0">📥 範例檔</a>
                    </div>
                </div>
                <button id="modal-upload-btn" onclick="modalUploadCSV()" class="bg-emerald-500 text-white py-2 rounded font-bold hover:bg-emerald-600 mt-1">上傳並開始分析例句</button>
                <div id="modal-upload-progress" class="hidden">
                    <div class="flex justify-between text-sm text-gray-500 mb-1">
                        <span id="modal-progress-label">準備中...</span>
                        <span id="modal-progress-count"></span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div id="modal-progress-bar" class="bg-emerald-500 h-3 rounded-full transition-all duration-300" style="width:0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="add-word-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md">
            <h3 class="text-xl font-bold text-emerald-800 mb-4 border-b pb-2">➕ 新增單字</h3>
            <input type="hidden" id="modal-set-id">
            <div class="space-y-3">
                <div>
                    <label class="text-sm font-bold text-gray-600">英文單字 <span class="text-red-500">*</span></label>
                    <input type="text" id="modal-en" class="w-full p-2 border rounded focus:outline-emerald-500 bg-gray-50">
                </div>
                <div>
                    <label class="text-sm font-bold text-gray-600">中文意思 <span class="text-red-500">*</span></label>
                    <input type="text" id="modal-zh" class="w-full p-2 border rounded focus:outline-emerald-500 bg-gray-50">
                </div>
                <div>
                    <label class="text-sm font-bold text-gray-600">詞性 (選填，如: n, v, adj)</label>
                    <input type="text" id="modal-pos" class="w-full p-2 border rounded focus:outline-emerald-500 bg-gray-50">
                </div>
                <div>
                    <label class="text-sm font-bold text-gray-600">自訂例句 (選填)</label>
                    <textarea id="modal-ex" placeholder="若留白，系統將自動搜尋 AI 例句" class="w-full p-2 border rounded focus:outline-emerald-500 bg-gray-50" rows="2"></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-6">
                <button onclick="closeWordModal()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 font-bold transition">取消</button>
                <button onclick="submitNewWord()" id="modal-submit-btn" class="px-4 py-2 bg-emerald-600 text-white rounded hover:bg-emerald-700 font-bold transition flex items-center gap-2">儲存單字</button>
            </div>
        </div>
    </div>

    <!-- 作答明細 Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-lg max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-xl font-bold text-emerald-800">📋 作答明細</h3>
                <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
            </div>
            <div id="detail-content" class="overflow-y-auto flex-1 space-y-2"></div>
        </div>
    </div>

    <script>
        // --- 帳號邏輯 ---
        function switchTab(mode) {
            const isLogin = mode === 'login';
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('register-form').classList.toggle('hidden', isLogin);
            document.getElementById('tab-login').className = isLogin ? "flex-1 py-2 font-bold text-emerald-600 border-b-4 border-emerald-600 transition-all" : "flex-1 py-2 font-bold text-gray-400 border-b-4 border-transparent hover:text-emerald-500 transition-all";
            document.getElementById('tab-register').className = !isLogin ? "flex-1 py-2 font-bold text-emerald-600 border-b-4 border-emerald-600 transition-all" : "flex-1 py-2 font-bold text-gray-400 border-b-4 border-transparent hover:text-emerald-500 transition-all";
        }

        async function loadUserList() {
            try {
                const res = await fetch(`/users?t=${new Date().getTime()}`);
                const users = await res.json();
                const select = document.getElementById('login-username');
                select.innerHTML = users.length === 0 ? '<option value="">目前尚無學生，請先註冊</option>' : '<option value="">-- 選擇你的名字 --</option>' + users.map(u => `<option value="${u.username}">${u.username}</option>`).join('');
            } catch (e) {}
        }

        async function register() {
            const name = document.getElementById('reg-username').value.trim();
            const pass = document.getElementById('reg-password').value.trim();
            if (!name) return alert("請輸入姓名！");
            if (!/^\d{4,}$/.test(pass)) return alert("密碼必須至少包含 4 個數字！");

            const fd = new FormData(); fd.append('username', name); fd.append('password', pass);
            const res = await fetch('/register', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.status === 'success') {
                localStorage.setItem('user_id', data.user_id); localStorage.setItem('username', data.username); checkLogin();
            } else alert(data.message);
        }

        async function login() {
            const name = document.getElementById('login-username').value;
            const pass = document.getElementById('login-password').value.trim();
            if (!name || !pass) return alert("請選擇名字並輸入密碼！");
            
            const fd = new FormData(); fd.append('username', name); fd.append('password', pass);
            const res = await fetch('/login', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.status === 'success') {
                localStorage.setItem('user_id', data.user_id); localStorage.setItem('username', data.username); checkLogin();
            } else alert(data.message);
        }

        function logout() { localStorage.clear(); location.reload(); }

        async function checkLogin() {
            if (localStorage.getItem('user_id')) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('user-display').innerText = localStorage.getItem('username');
                await showDashboard();
            } else loadUserList();
        }

        // --- 顯示控制台 (加入新增單字按鈕) ---
        async function showDashboard() {
            const currentUid = localStorage.getItem('user_id');
            const list = document.getElementById('sets-list');
            const rList = document.getElementById('records-list');
            list.innerHTML = "<p class='text-gray-400'>載入中...</p>";

            try {
                const ts = new Date().getTime();
                const [wrongRes, setsRes, recordRes] = await Promise.all([
                    fetch(`/users/${currentUid}/has_wrong?t=${ts}`),
                    fetch(`/users/${currentUid}/sets?t=${ts}`),
                    fetch(`/records/${currentUid}?t=${ts}`)
                ]);

                const { has_wrong } = await wrongRes.json();
                const sets = await setsRes.json();
                const { records, total, page, total_pages } = await recordRes.json();
                list.innerHTML = ""; 

                if (has_wrong) {
                    list.innerHTML += `
                        <li class="p-4 border-2 border-red-200 rounded flex justify-between items-center bg-red-50 mb-4 shadow-sm">
                            <div><span class="font-bold text-lg text-red-700">❌ 我的錯題本</span></div>
                            <div class="flex gap-2">
                                <a href="/static/words.html?mode=wrong" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 font-bold">查看</a>
                                <button onclick="startPractice(null, 'wrong')" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 font-bold">進入練習</button>
                            </div>
                        </li>
                    `;
                }

                if (sets.length === 0 && !has_wrong) list.innerHTML = "<p class='text-gray-500'>目前還沒有題組，請先上傳 CSV 檔案。</p>";
                else {
                    sets.forEach(set => {
                        const encodedName = encodeURIComponent(set.name);
                        list.innerHTML += `
                            <li class="p-4 border border-emerald-200 rounded flex flex-col sm:flex-row sm:justify-between sm:items-center bg-emerald-50 hover:bg-emerald-100 mb-2 transition shadow-sm gap-3">
                                <span class="font-bold text-lg">${set.name}</span>
                                <div class="flex gap-2 flex-wrap">
                                    <button onclick="startPractice(${set.id}, 'normal')" class="bg-emerald-500 text-white px-3 py-1.5 rounded hover:bg-emerald-600 font-bold text-sm">開始練習</button>
                                    <a href="/static/words.html?set_id=${set.id}&name=${encodedName}" class="bg-blue-500 text-white px-3 py-1.5 rounded hover:bg-blue-600 font-bold text-sm">查看</a>
                                    <a href="/sets/${set.id}/export" class="bg-gray-500 text-white px-3 py-1.5 rounded hover:bg-gray-600 font-bold text-sm">下載</a>
                                    <button onclick="deleteSet(${set.id})" class="bg-gray-300 text-gray-700 px-3 py-1.5 rounded hover:bg-red-500 hover:text-white transition font-bold text-sm">刪除</button>
                                </div>
                            </li>
                        `;
                    });
                }

                renderRecords(records, total, page, total_pages);
            } catch (err) { list.innerHTML = "<p class='text-red-500'>載入失敗，請重整。</p>"; }
        }

        // --- 👑 手動新增單字邏輯 ---
        function openWordModal(setId) {
            document.getElementById('modal-set-id').value = setId;
            document.getElementById('modal-en').value = '';
            document.getElementById('modal-zh').value = '';
            document.getElementById('modal-pos').value = '';
            document.getElementById('modal-ex').value = '';
            document.getElementById('add-word-modal').classList.remove('hidden');
        }

        function closeWordModal() {
            document.getElementById('add-word-modal').classList.add('hidden');
        }

        async function submitNewWord() {
            const setId = document.getElementById('modal-set-id').value;
            const en = document.getElementById('modal-en').value.trim();
            const zh = document.getElementById('modal-zh').value.trim();
            const pos = document.getElementById('modal-pos').value.trim();
            const ex = document.getElementById('modal-ex').value.trim();

            if (!en || !zh) return alert("英文單字和中文意思為必填項目！");

            const btn = document.getElementById('modal-submit-btn');
            btn.innerText = "儲存中..."; btn.disabled = true;

            const fd = new FormData();
            fd.append('english', en); fd.append('chinese', zh);
            fd.append('part_of_speech', pos); fd.append('example_sentence', ex);

            try {
                const res = await fetch(`/sets/${setId}/words`, { method: 'POST', body: fd });
                if (res.ok) {
                    alert("✅ 單字新增成功！");
                    closeWordModal();
                } else alert("新增失敗");
            } catch (err) { alert("網路錯誤"); }
            finally {
                btn.innerText = "儲存單字"; btn.disabled = false;
            }
        }

        // --- 紀錄翻頁 ---
        let currentPage = 1;

        function renderRecords(records, total, page, total_pages) {
            const rList = document.getElementById('records-list');
            const pagination = document.getElementById('records-pagination');
            rList.innerHTML = records.length
                ? records.map(r => `
                    <li class="p-2 bg-white border-b flex justify-between items-center ${r.has_detail ? 'cursor-pointer hover:bg-emerald-50' : ''} rounded transition"
                        ${r.has_detail ? `onclick="showDetail(${r.id})"` : ''}>
                        <span class="text-xs text-gray-400">📅 ${r.created_at}</span>
                        <span class="font-medium text-gray-700">${r.set_name}</span>
                        <span class="font-bold text-emerald-600 bg-emerald-100 px-2 py-1 rounded">${r.score}</span>
                    </li>`).join('')
                : '<li class="text-gray-400 py-2">60 天內暫無紀錄</li>';

            if (total_pages > 1) {
                pagination.style.display = 'flex';
                document.getElementById('page-info').innerText = `第 ${page} / ${total_pages} 頁`;
                document.getElementById('page-prev').disabled = page <= 1;
                document.getElementById('page-next').disabled = page >= total_pages;
            } else {
                pagination.style.display = 'none';
            }
        }

        async function changePage(dir) {
            const currentUid = localStorage.getItem('user_id');
            currentPage += dir;
            const ts = new Date().getTime();
            const res = await fetch(`/records/${currentUid}?page=${currentPage}&t=${ts}`);
            const { records, total, page, total_pages } = await res.json();
            renderRecords(records, total, page, total_pages);
        }

        // --- 作答明細 ---
        async function showDetail(recordId) {
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('detail-content');
            content.innerHTML = '<p class="text-gray-400 text-center py-4">載入中...</p>';
            modal.classList.remove('hidden');
            const res = await fetch(`/records/${recordId}/details`);
            const logs = await res.json();
            if (!logs.length) {
                content.innerHTML = '<p class="text-gray-400 text-center py-4">無作答明細</p>';
                return;
            }
            content.innerHTML = logs.map(l => `
                <div class="p-2 rounded ${l.is_correct ? 'bg-emerald-50' : 'bg-red-50'}">
                    <div class="flex items-center justify-between">
                        <span>${l.is_correct ? '✅' : '❌'}</span>
                        <span class="font-bold flex-1 ml-2">${l.english}</span>
                        <span class="text-gray-500 text-sm">${l.chinese}</span>
                    </div>
                    ${!l.is_correct && l.user_answer ? `<div class="mt-1 ml-6 text-sm text-red-400">你的作答：${l.user_answer}</div>` : ''}
                </div>
            `).join('');
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        // --- 其他原有功能 ---
        function startPractice(setId, mode) {
            let count = prompt("請輸入要練習的題數 (輸入 'all' 為全部練習，或至少輸入 5)：", "all");
            if (count === null) return;
            if (count !== 'all') {
                const n = parseInt(count);
                if (isNaN(n) || n < 5) return alert("請輸入 'all' 或大於等於 5 的數字。");
                count = n;
            }
            window.location.href = `/static/practice.html?count=${count}&${mode === 'wrong' ? 'mode=wrong' : 'set_id='+setId}`;
        }

        async function uploadCSV() {
            const currentUid = localStorage.getItem('user_id');
            const name = document.getElementById('set-name').value;
            const file = document.getElementById('csv-file').files[0];
            if (!name || !file) return alert("請填寫題組名稱並選擇檔案");

            const btn = document.getElementById('upload-btn');
            const progressBox = document.getElementById('upload-progress');
            const progressBar = document.getElementById('progress-bar');
            const progressLabel = document.getElementById('progress-label');
            const progressCount = document.getElementById('progress-count');

            btn.disabled = true;
            btn.innerText = "🚀 上傳中...";
            progressBox.classList.remove('hidden');
            progressLabel.innerText = "正在上傳檔案...";
            progressCount.innerText = "";
            progressBar.style.width = "0%";

            const fd = new FormData();
            fd.append('set_name', name);
            fd.append('file', file);

            try {
                const res = await fetch(`/upload_csv/${currentUid}`, { method: 'POST', body: fd });
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop(); // 保留未完整的行

                    for (const line of lines) {
                        if (!line.startsWith("data: ")) continue;
                        const data = JSON.parse(line.slice(6));

                        if (data.error) {
                            alert("上傳發生錯誤：" + data.error);
                            return;
                        }
                        if (data.done) {
                            progressBar.style.width = "100%";
                            progressLabel.innerText = "✅ 完成！即將重新整理...";
                            progressCount.innerText = "";
                            setTimeout(() => location.reload(), 800);
                            return;
                        }
                        // 更新進度條
                        const pct = data.total > 0 ? Math.round((data.current / data.total) * 100) : 0;
                        progressBar.style.width = pct + "%";
                        progressLabel.innerText = data.current === 0
                            ? "正在準備題組..."
                            : `正在處理：${data.word}`;
                        progressCount.innerText = data.current > 0
                            ? `${data.current} / ${data.total}`
                            : "";
                    }
                }
            } catch (err) {
                alert("發生錯誤，請重試。");
            } finally {
                btn.disabled = false;
                btn.innerText = "上傳並開始分析例句";
            }
        }

        // --- 上傳題組 Modal ---
        function openUploadModal() {
            document.getElementById('modal-set-name').value = '';
            document.getElementById('modal-csv-file').value = '';
            document.getElementById('modal-upload-progress').classList.add('hidden');
            document.getElementById('modal-progress-bar').style.width = '0%';
            document.getElementById('modal-upload-btn').disabled = false;
            document.getElementById('modal-upload-btn').innerText = '上傳並開始分析例句';
            document.getElementById('upload-modal').classList.remove('hidden');
        }

        function closeUploadModal() {
            document.getElementById('upload-modal').classList.add('hidden');
        }

        async function modalUploadCSV() {
            const currentUid = localStorage.getItem('user_id');
            const name = document.getElementById('modal-set-name').value.trim();
            const file = document.getElementById('modal-csv-file').files[0];
            if (!name || !file) return alert('請填寫題組名稱並選擇檔案');

            const btn = document.getElementById('modal-upload-btn');
            const progressBox = document.getElementById('modal-upload-progress');
            const progressBar = document.getElementById('modal-progress-bar');
            const progressLabel = document.getElementById('modal-progress-label');
            const progressCount = document.getElementById('modal-progress-count');

            btn.disabled = true;
            btn.innerText = '🚀 上傳中...';
            progressBox.classList.remove('hidden');
            progressLabel.innerText = '正在上傳檔案...';
            progressCount.innerText = '';
            progressBar.style.width = '0%';

            const fd = new FormData();
            fd.append('set_name', name);
            fd.append('file', file);

            try {
                const res = await fetch(`/upload_csv/${currentUid}`, { method: 'POST', body: fd });
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = JSON.parse(line.slice(6));
                        if (data.error) { alert('上傳發生錯誤：' + data.error); return; }
                        if (data.done) {
                            progressBar.style.width = '100%';
                            progressLabel.innerText = '✅ 完成！';
                            progressCount.innerText = '';
                            setTimeout(() => { closeUploadModal(); location.reload(); }, 800);
                            return;
                        }
                        const pct = data.total > 0 ? Math.round((data.current / data.total) * 100) : 0;
                        progressBar.style.width = pct + '%';
                        progressLabel.innerText = data.current === 0 ? '正在準備題組...' : `正在處理：${data.word}`;
                        progressCount.innerText = data.current > 0 ? `${data.current} / ${data.total}` : '';
                    }
                }
            } catch (err) {
                alert('發生錯誤，請重試。');
            } finally {
                btn.disabled = false;
                btn.innerText = '上傳並開始分析例句';
            }
        }

        async function deleteSet(setId) {
            if (!confirm("⚠️ 確定要刪除這個題組嗎？")) return;
            const res = await fetch(`/sets/${setId}`, { method: 'DELETE' });
            if (res.ok) showDashboard(); 
        }

        checkLogin();
    </script>
